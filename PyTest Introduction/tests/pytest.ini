[pytest]
# marks
markers =
    validate_csv: тести для перевірки вмісту CSV
    unmarked: автоматичний маркер для тестів без явних міток

# python_files

# Налаштування пошуку тестів : тільки файли, що починаються на test_
python_files = test_*
# addopts

addopts = --html=report.html --self-contained-html