[pytest]
# Шаблони для пошуку тестів
python_files = test_*
python_functions = test_*
python_classes = Test*

# Налаштування виводу та звітів
addopts = 
    -v 
    -s
    --tb=short
    --html=reports/dq_report.html 
    --self-contained-html

# Реєстрація маркерів для уникнення PytestUnknownMarkWarning
markers =
    reconciliation: тести на зіставлення даних між Postgres та Parquet (основний тип тестів)
    parquet_data: перевірки, що стосуються виключно Parquet файлів
    schema: перевірка структури таблиць та типів даних
    smoke: швидкі перевірки (наприклад, чи не порожній датасет)
    
    # Маркери для специфічних таблиць (для запуску окремих наборів)
    facility_min: тести для таблиці facility_name_min_time_spent
    facility_avg: тести для таблиці facility_type_avg_time_spent
    patient_sum: тести для таблиці patient_sum_treatment_cost

# Налаштування логування в терміналі
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S