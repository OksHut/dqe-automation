[pytest]
python_files = test_*
python_functions = test_*
python_classes = Test*

markers =
    parquet_files: валідація даних у Parquet файлах
    db_checks: тести для перевірки PostgreSQL
    dq_check: загальні перевірки якості даних
    example: marks example tests
    parquet_data: marks tests for parquet data

addopts = 
    -v 
    --html=reports/dq_report.html 
    --self-contained-html

    pytest -m db_check --html=reports/db_report.html